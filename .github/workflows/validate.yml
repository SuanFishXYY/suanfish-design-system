name: Validate SKILL.md

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - '.skill-manifest.json'
      - 'agents/**'
      - 'references/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'SKILL.md'
      - '.skill-manifest.json'
      - 'agents/**'
      - 'references/**'
      - '.github/workflows/validate.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Lint SKILL.md structure
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: test -f SKILL.md

      - name: Check required frontmatter fields
        run: |
          for field in name description version author license; do
            if ! grep -E "^${field}:" SKILL.md > /dev/null; then
              echo "❌ Missing frontmatter field: ${field}"
              exit 1
            fi
            echo "✅ ${field}"
          done

      - name: Check agents directory (>=14, grow over time)
        run: |
          count=$(ls agents/*.md 2>/dev/null | wc -l)
          min=14
          if [ "$count" -lt "$min" ]; then
            echo "❌ Expected at least $min agents, found $count"
            exit 1
          fi
          echo "✅ $count agents present (min $min)"

      - name: Check references count
        run: |
          count=$(ls references/*.md 2>/dev/null | wc -l)
          echo "📚 references: $count files"

      - name: Validate manifest JSON
        run: |
          python3 -c "import json; json.load(open('.skill-manifest.json'))"
          echo "✅ manifest valid JSON"
