name: Validate SKILL.md

on:
  push:
    bran ches: [main]
    paths:
      - 'SKILL.md'
       - '.skill-manifest.json'
      - 'agents/ **'
      - 'references/**'
  pull_request:
     paths:
      - 'SKILL.md'
      - '.skill- manifest.json'
      - 'agents/**'
      - 'r eferences/**'

jobs:
  validate:
    runs-on:  ubuntu-latest
    name: Lint SKILL.md struct ure
    steps:
      - uses: actions/checkout @v4

      - name: Check SKILL.md exists
         run: test -f SKILL.md

      - name: Chec k required frontmatter fields
        run: |
           for field in name description versi on author license; do
            if ! grep - E "^${field}:" SKILL.md > /dev/null; then
               echo "❌ Missing frontmatter fiel d: ${field}"
              exit 1
             fi
            echo "✅ ${field}"
           done

      - name: Check agents directory h as 14 agents
        run: |
          count=$ (ls agents/*.md 2>/dev/null | wc -l)
           if [ "$count" -ne 14 ]; then
            ec ho "❌ Expected 14 agents, found $count"
             exit 1
          fi
          echo " ✅ 14 agents present"

      - name: Check r eferences count
        run: |
          coun t=$(ls references/*.md 2>/dev/null | wc -l)
           echo "📚 references: $count files" 

      - name: Validate manifest JSON
         run: |
          python3 -c "import json; j son.load(open('.skill-manifest.json'))"
           echo "✅ manifest valid JSON"
 